# Fineprint pipeline runner.
#
# Why GitHub Actions: the pipeline deliberately sleeps to stay inside the
# Groq/Gemini free-tier rate limits, so a first analysis can take 15–30
# minutes — far past Vercel's 300s function ceiling. An Actions runner can
# sleep all it wants, and the job commits its outputs — the exported static
# data plus the markdown snapshot archive (data/snapshots/) — which is what
# triggers the Vercel redeploy of the public site.
#
# Triggered via workflow_dispatch:
# - by the admin panel (server action calls the GitHub API), or
# - manually from the Actions tab.
#
# Modes:
# - pipeline: execute the pipeline_runs row given in run_id (results publish
#             automatically — no review step), then export.
# - export:   only export + commit static data (admin "Sync site data"
#             button, or after approving a low-confidence classification).
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   NEXT_PUBLIC_SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY,
#   GROQ_API_KEY, GEMINI_API_KEY

name: pipeline

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "pipeline (analyze a service) or export (sync static data only)"
        type: choice
        options: [pipeline, export]
        default: pipeline
      run_id:
        description: "pipeline_runs.id to execute (required for mode=pipeline)"
        required: false

# Serialize runs: parallel jobs would fight over the same per-model
# rate-limit budget and both end up slower.
concurrency:
  group: fineprint-pipeline
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    # ubuntu-latest ships Google Chrome, which the extraction stage launches
    # headlessly (via playwright-core, no browser download) when a site
    # blocks plain fetches or renders only with JavaScript.
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run pipeline
        if: inputs.mode == 'pipeline'
        env:
          PIPELINE_RUN_ID: ${{ inputs.run_id }}
        run: pnpm pipeline

      # Sync the repo's data/ to the database — even if the pipeline step
      # failed, since it only reflects already-published state.
      #
      # data/ is derived from the DB, so it is NEVER merged textually:
      # every attempt fetches the remote tip, hard-resets onto it, and
      # regenerates — missing snapshot files are restored from the DB and
      # the JSON export is rebuilt. Human pushes landing mid-run therefore
      # can't cause rebase conflicts; a push race just retries the whole
      # regeneration. (Exact markdown written by this run's pipeline step
      # is untracked on the first attempt and survives the reset; if a
      # retry discards it, the backfill restores a reconstruction.)
      - name: Sync & push data
        if: ${{ !cancelled() }}
        run: |
          git config user.name "fineprint-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          sync_and_push() {
            git fetch origin "${GITHUB_REF_NAME}"
            git reset --hard "origin/${GITHUB_REF_NAME}"
            pnpm snapshots:backfill
            pnpm export:static
            git add data
            if git diff --cached --quiet; then
              echo "No data changes."
              return 0
            fi
            git commit -m "chore(data): sync service data"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          }
          sync_and_push || sync_and_push || sync_and_push
