# Fineprint pipeline runner.
#
# Why GitHub Actions: the pipeline deliberately sleeps to stay inside the
# Groq/Gemini free-tier rate limits, so a first analysis can take 15–30
# minutes — far past Vercel's 300s function ceiling. An Actions runner can
# sleep all it wants, and the job also commits the exported static data,
# which is what triggers the Vercel redeploy of the public site.
#
# Triggered via workflow_dispatch:
# - by the admin panel (server action calls the GitHub API), or
# - manually from the Actions tab.
#
# Modes:
# - pipeline: execute the pipeline_runs row given in run_id (results publish
#             automatically — no review step), then export.
# - export:   only export + commit static data (admin "Sync site data"
#             button, or after approving a low-confidence classification).
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   NEXT_PUBLIC_SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY,
#   GROQ_API_KEY, GEMINI_API_KEY,
#   R2_ACCOUNT_ID, R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY, R2_BUCKET_NAME

name: pipeline

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "pipeline (analyze a service) or export (sync static data only)"
        type: choice
        options: [pipeline, export]
        default: pipeline
      run_id:
        description: "pipeline_runs.id to execute (required for mode=pipeline)"
        required: false

# Serialize runs: parallel jobs would fight over the same per-model
# rate-limit budget and both end up slower.
concurrency:
  group: fineprint-pipeline
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run pipeline
        if: inputs.mode == 'pipeline'
        env:
          PIPELINE_RUN_ID: ${{ inputs.run_id }}
        run: pnpm pipeline

      # Export even if the pipeline step failed — it only reflects already-
      # published data, and keeping the site in sync is always safe.
      - name: Export static data
        if: ${{ !cancelled() }}
        run: pnpm export:static

      - name: Commit & push static data
        if: ${{ !cancelled() }}
        run: |
          git config user.name "fineprint-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          if git diff --cached --quiet; then
            echo "No static data changes."
          else
            git commit -m "chore(data): sync static service data"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push
          fi
